<!DOCTYPE html>
<html lang="en"><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COVENANT CALCULATOR </title>
<style>
  /* Reset and base styles */
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background-color: #5c5959;
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  /* Calculator container styling */
  .calculator {
    position: relative;
    background-color: black;
    width: 320px;
    border-radius: 40px;
    padding: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    transition: width 0.4s cubic-bezier(0.25, 1, 0.5, 1);
    overflow: hidden;
  }

  /* Full mode width */
  .calculator.full {
    width: 680px;
  }

  /* Toggle button styling */
  .toggle-btn {
    position: absolute;
    top: 5px;
    right: 5px;
    background: transparent;
    color: #b89d03;
    border: none;
    font-size: 50px;
    cursor: pointer;
    z-index: 10;
    width: auto;
    height: auto;
    padding: 5px;
  }

  /* Screen/Display styling */
  .display {
    color: white;
    background-color: black;
    box-shadow: 0 0 3px #bbb803;
    border-radius: 40px;
    font-size: 65px;
    text-align: right;
    margin-top: 20px;
    margin-bottom: 20px;
    padding-right: 15px;
    font-weight: 300;
    overflow: hidden;
    white-space: nowrap;
    transition: all 0.4s;
  }

  /* Layout wrappers */
  .pad-wrapper {
    display: flex;
    gap: 12px;
  }

  /* Scientific Pad (Hidden by default) */
  .sci-pad {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    width: 0;
    opacity: 0;
    visibility: hidden;
    transition: all 0.3s ease;
  }

  .calculator.full .sci-pad {
    width: 348px; /* 4 columns + gaps */
    opacity: 1;
    visibility: visible;
  }

  /* Basic Pad */
  .basic-pad {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    flex-shrink: 0;
  }

  /* Base button styling */
  button {
    width: 65px;
    height: 65px;
    border-radius: 50%;
    border: none;
    font-size: 28px;
    cursor: pointer;
    outline: none;
    transition: filter 0.1s, background-color 0.2s;
  }

  button:active {
    filter: brightness(1.5);
  }

  /* Color themes for different button types */
  .bg-gray {
    background-color: rgb(163, 163, 3);
    color: black;
    font-size: 24px;
  }

  .bg-dark {
    background-color: #2E3440;
    color: white;
  }

  .bg-sci {
    background-color: #1a1d44;
    color: white;
    font-size: 20px;
  }

  .bg-orange {
    background-color: rgba(255, 217, 0, 0.719);
    box-shadow: 0 0 10px rgba(255, 217, 0, 0.719);
    color: white;
    font-size: 36px;
  }

  /* Special styling for the zero button */
  .zero {
    grid-column: span 2;
    width: 142px;
    border-radius: 35px;
    text-align: left;
    padding-left: 25px;
  }
  h1 {
    text-align: center;
    color: white;
    font-weight: 700;
  }
</style>
</head>
<body>

<div class="calculator" id="calculator">
  <button class="toggle-btn" onclick="toggleMode()" title="Toggle Full Mode">⤢</button><br>
  <h1>COVENANT CALCULATOR</h1>
  
  <div class="display" id="display">0</div>
  
  <div class="pad-wrapper">
    <div class="basic-pad">
      <button class="bg-gray" onclick="clearDisplay()">AC</button>
      <button class="bg-gray" onclick="toggleSign()">+/-</button>
      <button class="bg-gray" onclick="percent()">%</button>
      <button class="bg-orange" onclick="setOperation('/')">÷</button>

      <button class="bg-dark" onclick="appendNumber(7)">7</button>
      <button class="bg-dark" onclick="appendNumber(8)">8</button>
      <button class="bg-dark" onclick="appendNumber(9)">9</button>
      <button class="bg-orange" onclick="setOperation('*')">×</button>

      <button class="bg-dark" onclick="appendNumber(4)">4</button>
      <button class="bg-dark" onclick="appendNumber(5)">5</button>
      <button class="bg-dark" onclick="appendNumber(6)">6</button>
      <button class="bg-orange" onclick="setOperation('-')">−</button>

      <button class="bg-dark" onclick="appendNumber(1)">1</button>
      <button class="bg-dark" onclick="appendNumber(2)">2</button>
      <button class="bg-dark" onclick="appendNumber(3)">3</button>
      <button class="bg-orange" onclick="setOperation('+')">+</button>

      <button class="bg-dark zero" onclick="appendNumber(0)">0</button>
      <button class="bg-dark" onclick="appendNumber('.')">.</button>
      <button class="bg-orange" onclick="calculate()">=</button>
    </div>

    <div class="sci-pad" id="sci-pad">
      <button class="bg-sci" onclick="setUnaryOperation('sq')">x²</button>
      <button class="bg-sci" onclick="setUnaryOperation('cb')">x³</button>
      <button class="bg-sci" onclick="setUnaryOperation('sqrt')">√x</button>
      <button class="bg-sci" onclick="setUnaryOperation('inv')">1/x</button>

      <button class="bg-sci" onclick="setUnaryOperation('sin')">sin</button>
      <button class="bg-sci" onclick="setUnaryOperation('cos')">cos</button>
      <button class="bg-sci" onclick="setUnaryOperation('tan')">tan</button>
      <button class="bg-sci" onclick="setUnaryOperation('log')">log</button>

      <button class="bg-sci" onclick="setUnaryOperation('asin')">sin⁻¹</button>
      <button class="bg-sci" onclick="setUnaryOperation('acos')">cos⁻¹</button>
      <button class="bg-sci" onclick="setUnaryOperation('atan')">tan⁻¹</button>
      <button class="bg-sci" onclick="setUnaryOperation('ln')">ln</button>

      <button class="bg-sci" onclick="insertConstant('e')">e</button>
      <button class="bg-sci" onclick="insertConstant('pi')">π</button>
      <button class="bg-sci" onclick="setUnaryOperation('fact')">x!</button>
      <button class="bg-sci" onclick="setUnaryOperation('abs')">|x|</button>

      <button class="bg-sci" style="visibility: hidden;"></button>
      <button class="bg-sci" style="visibility: hidden;"></button>
      <button class="bg-sci" onclick="insertConstant('rand')">Rand</button>
      <button class="bg-sci" onclick="clearDisplay()">AC</button>
    </div>
  </div>
</div>

<script>
  let currentInput = '0';
  let previousInput = '';
  let operation = null;
  let shouldResetScreen = false;

  const display = document.getElementById('display');

  // Toggle between Normal and Full Mode
  function toggleMode() {
    const calc = document.getElementById('calculator');
    calc.classList.toggle('full');
  }

  // Update the screen
  function updateDisplay() {
    // Allow more digits in full mode, restrict in normal mode
    const isFull = document.getElementById('calculator').classList.contains('full');
    const maxDigits = isFull ? 18 : 9;
    let text = pendingUnary ? `${pendingUnaryLabel} ${currentInput}` : currentInput;

    // Simple overflow handler
    if (text.length > maxDigits && !text.includes('e')) {
      display.innerText = parseFloat(currentInput).toPrecision(maxDigits - 3);
    } else {
      display.innerText = text;
    }
  }

  // Basic Functions
  function appendNumber(number) {
    if (number === '.' && currentInput.includes('.')) return;
    if (currentInput === '0' || shouldResetScreen) {
      currentInput = number.toString();
      shouldResetScreen = false;
    } else {
      currentInput += number.toString();
    }
    updateDisplay();
  }

  function clearDisplay() {
    currentInput = '0';
    previousInput = '';
    operation = null;
    pendingUnary = null;
    pendingUnaryLabel = '';
    shouldResetScreen = false;
    updateDisplay();
  }

  function setOperation(op) {
    if (operation !== null) calculate();
    previousInput = currentInput;
    operation = op;
    shouldResetScreen = true;
  }

  function toggleSign() {
    currentInput = (parseFloat(currentInput) * -1).toString();
    updateDisplay();
  }

  function percent() {
    currentInput = (parseFloat(currentInput) / 100).toString();
    updateDisplay();
  }

  // Unary scientific operations are entered in prefix style: operator before number.
  let pendingUnary = null;
  let pendingUnaryLabel = '';

  function setUnaryOperation(func) {
    pendingUnary = func;
    pendingUnaryLabel = getUnaryLabel(func);
    shouldResetScreen = true;
    updateDisplay();
  }

  function getUnaryLabel(func) {
    switch (func) {
      case 'sq': return 'x²';
      case 'cb': return 'x³';
      case 'sqrt': return '√';
      case 'inv': return '1/';
      case 'sin': return 'sin';
      case 'cos': return 'cos';
      case 'tan': return 'tan';
      case 'asin': return 'sin⁻¹';
      case 'acos': return 'cos⁻¹';
      case 'atan': return 'tan⁻¹';
      case 'log': return 'log';
      case 'ln': return 'ln';
      case 'abs': return '|x|';
      case 'fact': return 'fact';
      default: return '';
    }
  }

  function applyUnaryOperation(func) {
    let current = parseFloat(currentInput);
    let result = 0;

    switch (func) {
      case 'sq': result = Math.pow(current, 2); break;
      case 'cb': result = Math.pow(current, 3); break;
      case 'sqrt': result = Math.sqrt(current); break;
      case 'inv': result = 1 / current; break;
      case 'sin': result = Math.sin(current); break; // Assumes Radians
      case 'cos': result = Math.cos(current); break;
      case 'tan': result = Math.tan(current); break;
      case 'asin': result = Math.asin(current); break;
      case 'acos': result = Math.acos(current); break;
      case 'atan': result = Math.atan(current); break;
      case 'log': result = Math.log10(current); break;
      case 'ln': result = Math.log(current); break;
      case 'abs': result = Math.abs(current); break;
      case 'fact': 
        if (current < 0 || !Number.isInteger(current)) {
          currentInput = "Error";
          updateDisplay();
          shouldResetScreen = true;
          return;
        }
        result = 1;
        for (let i = 2; i <= current; i++) result *= i;
        break;
      default:
        return;
    }

    if (isNaN(result)) {
      currentInput = "Error";
    } else {
      currentInput = (Math.round(result * 10000000000) / 10000000000).toString();
    }
    pendingUnary = null;
    pendingUnaryLabel = '';
    shouldResetScreen = true;
    updateDisplay();
  }

  function calculate() {
    if (pendingUnary !== null) {
      applyUnaryOperation(pendingUnary);
      return;
    }
    if (operation === null || shouldResetScreen) return;
    let prev = parseFloat(previousInput);
    let current = parseFloat(currentInput);
    let result;

    switch (operation) {
      case '+': result = prev + current; break;
      case '-': result = prev - current; break;
      case '*': result = prev * current; break;
      case '/': 
        if (current === 0) {
            currentInput = "Error";
            updateDisplay();
            shouldResetScreen = true;
            return;
        }
        result = prev / current; 
        break;
      default: return;
    }

    currentInput = Math.round(result * 1000000000) / 1000000000;
    currentInput = currentInput.toString();
    operation = null;
    shouldResetScreen = true;
    updateDisplay();
  }

  // Insert Constants like Pi or E
  function insertConstant(constant) {
    if (constant === 'pi') currentInput = Math.PI.toString();
    if (constant === 'e') currentInput = Math.E.toString();
    if (constant === 'rand') currentInput = Math.random().toString();
    shouldResetScreen = true;
    updateDisplay();
  }
</script>
